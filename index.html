<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hafland Evolution 3.7.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --border: #f0f0f0; --card: #ffffff; --glass: rgba(255, 255, 255, 0.9); }
        .dark { --bg: #000000; --text: #ffffff; --border: #1a1a1a; --card: #0a0a0a; --glass: rgba(0, 0, 0, 0.9); }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; -webkit-tap-highlight-color: transparent; transition: background 0.3s ease; }
        
        .glass-nav { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); z-index: 100; position: fixed; bottom: 0; left: 0; right: 0; height: calc(75px + env(safe-area-inset-bottom)); display: flex; justify-content: space-around; align-items: flex-start; padding-top: 12px; }
        .content-scroll { height: calc(100vh - 150px); overflow-y: auto; padding-bottom: 120px; }
        .content-scroll::-webkit-scrollbar { display: none; }
        
        .msg-me { background: var(--text); color: var(--bg); border-radius: 18px 18px 4px 18px; border: 1px solid var(--text); }
        .msg-them { background: var(--card); color: var(--text); border-radius: 18px 18px 18px 4px; border: 1px solid var(--border); }
        .msg-anon { background: #000; color: #00ff00; border-radius: 18px; font-family: monospace; border: 1px dashed #333; }
        
        .nick-gold { color: #ffd700; font-weight: 800; text-shadow: 0 0 5px rgba(255,215,0,0.3); }
        .nick-neon { color: #00f2ff; text-shadow: 0 0 8px #00f2ff; font-weight: 800; }
        .nick-rainbow { background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        
        .frame-neon { outline: 3px solid #00f2ff; outline-offset: -2px; }
        .frame-gold { outline: 3px solid #ffd700; outline-offset: -2px; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .console-box { background: #000; color: #0f0; font-family: 'Courier New', monospace; width: 100%; max-width: 450px; border-radius: 24px; padding: 20px; border: 1px solid #333; }
        
        button:active { transform: scale(0.96); opacity: 0.8; }
        .card-flat { background: var(--card); border: 1px solid var(--border); border-radius: 24px; }
    </style>
</head>
<body class="light">
    <div id="app" class="h-full flex flex-col relative"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAkgC4melkEcj0pDywonPG3aAeE3vACoF0", 
            authDomain: "hafland-c8dc3.firebaseapp.com", 
            projectId: "hafland-c8dc3", 
            storageBucket: "hafland-c8dc3.firebasestorage.app", 
            messagingSenderId: "163991622474", 
            appId: "1:163991622474:web:06a7357e295c9a98b327b3" 
        };

        const fApp = initializeApp(firebaseConfig);
        const auth = getAuth(fApp);
        const db = getFirestore(fApp);
        const APP_ID = "hafland_v3_stable";

        window.state = {
            user: null, profile: null, tab: 'chats', subTab: 'users', chatMode: null, isGroup: false,
            viewProfile: null, messages: [], users: [], groups: [],
            anonMode: false, showConsole: false, consoleLogs: ['> system.ready']
        };

        const actions = {
            setTab: (t) => { state.tab = t; state.chatMode = null; state.viewProfile = null; render(); },
            setSubTab: (t) => { state.subTab = t; render(); },
            openChat: (id, isGroup = false) => { if(id === 'null') { state.chatMode = null; } else { state.chatMode = id; state.isGroup = isGroup; state.viewProfile = null; } render(); },
            openProfile: (uid) => { if(uid === 'null') { state.viewProfile = null; } else { state.viewProfile = uid; state.chatMode = null; } render(); },
            toggleAnon: () => { state.anonMode = !state.anonMode; render(); },
            toggleConsole: (v) => { state.showConsole = v; render(); },
            
            sendMsg: async () => {
                const el = document.getElementById('msg-input');
                const val = el?.value.trim();
                if(!val || !state.chatMode) return;
                
                const isAnon = state.anonMode;
                const hasPremium = state.profile.premium;
                
                // Проверка оплаты анонимки
                if(isAnon && !hasPremium) {
                    if(state.profile.stars < 50) return alert("Необходимо 50 S для анонимного сообщения");
                    await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), { stars: increment(-50) });
                }
                
                await addDoc(collection(db, 'artifacts', APP_ID, 'messages'), {
                    from: isAnon ? 'anon' : state.profile.uid,
                    to: state.chatMode,
                    isGroup: state.isGroup,
                    text: val,
                    sender: isAnon ? 'Аноним' : state.profile.username,
                    time: Date.now(),
                    isAnon: isAnon
                });
                
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), { xp: increment(10) });
                el.value = '';
            },

            changeAvatar: () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = async () => {
                        await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), { avatar: reader.result });
                        alert("Аватар обновлен!");
                    };
                    reader.readAsDataURL(file);
                };
                input.click();
            },

            buyItem: async (field, price, val) => {
                if(state.profile.stars < price) return alert("Недостаточно звезд!");
                let update = { stars: increment(-price), [field]: val };
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), update);
                alert("Успешно куплено!");
            }
        };

        // Event Delegation
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if(!btn) return;
            const action = btn.getAttribute('data-action');
            const p1 = btn.getAttribute('data-param');
            const p2 = btn.getAttribute('data-param2');
            
            if(action === 'setTab') actions.setTab(p1);
            if(action === 'setSubTab') actions.setSubTab(p1);
            if(action === 'openChat') actions.openChat(p1, p2 === 'true');
            if(action === 'openProfile') actions.openProfile(p1);
            if(action === 'sendMsg') actions.sendMsg();
            if(action === 'toggleAnon') actions.toggleAnon();
            if(action === 'toggleConsole') actions.toggleConsole(p1 === 'true');
            if(action === 'changeAvatar') actions.changeAvatar();
            if(action === 'buyItem') actions.buyItem(p1, parseInt(p2), btn.getAttribute('data-val'));
            if(action === 'logout') { localStorage.clear(); location.reload(); }
            if(action === 'toggleTheme') updateDoc(doc(db,'artifacts',APP_ID,'users',state.profile.uid), {darkMode: !state.profile.darkMode});
            if(action === 'login' || action === 'reg') handleAuth(action);
        });

        async function handleAuth(mode) {
            const n = document.getElementById('a-nick').value.trim().toLowerCase();
            const p = document.getElementById('a-pass').value.trim();
            if(!n || !p) return;
            const regRef = doc(db, 'artifacts', APP_ID, 'registry', n);
            const regSnap = await getDoc(regRef);
            
            if(mode === 'login') {
                if(regSnap.exists() && regSnap.data().pass === p) {
                    localStorage.setItem('haf_nick', n); localStorage.setItem('haf_pass', p);
                    initListeners(regSnap.data().uid);
                } else alert("Неверный логин или пароль");
            } else {
                if(regSnap.exists()) return alert("Никнейм занят");
                const uid = auth.currentUser.uid;
                await setDoc(regRef, { uid, pass: p });
                await setDoc(doc(db, 'artifacts', APP_ID, 'users', uid), {
                    uid, username: n, pass: p, stars: 100, tag: 'USER', nfts: [], avatar: null,
                    premium: (n === 'hafa168'), nickStyle: 'normal', level: 1, xp: 0, darkMode: false, frame: 'none'
                });
                localStorage.setItem('haf_nick', n); localStorage.setItem('haf_pass', p);
                initListeners(uid);
            }
        }

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                state.user = u;
                const sn = localStorage.getItem('haf_nick'), sp = localStorage.getItem('haf_pass');
                if(sn && sp) {
                    const r = await getDoc(doc(db, 'artifacts', APP_ID, 'registry', sn.toLowerCase()));
                    if(r.exists() && r.data().pass === sp) initListeners(r.data().uid);
                    else renderAuth();
                } else renderAuth();
            } else { await signInAnonymously(auth); }
        });

        function initListeners(uid) {
            onSnapshot(doc(db, 'artifacts', APP_ID, 'users', uid), (s) => {
                if(s.exists()) {
                    state.profile = s.data();
                    document.body.className = state.profile.darkMode ? 'dark' : 'light';
                    render();
                }
            });
            onSnapshot(collection(db, 'artifacts', APP_ID, 'users'), (s) => { state.users = s.docs.map(d => d.data()); render(); });
            onSnapshot(collection(db, 'artifacts', APP_ID, 'messages'), (s) => { 
                state.messages = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.time - b.time); 
                render(); 
            });
        }

        function renderAuth() {
            document.getElementById('app').innerHTML = `
                <div class="h-full flex flex-col items-center justify-center p-10">
                    <h1 class="text-5xl font-black italic tracking-tighter mb-12">Hafland</h1>
                    <div class="w-full max-w-xs space-y-3">
                        <input id="a-nick" class="w-full p-5 rounded-3xl border border-gray-100 text-center font-bold outline-none uppercase text-xs" placeholder="НИКНЕЙМ">
                        <input id="a-pass" type="password" class="w-full p-5 rounded-3xl border border-gray-100 text-center font-bold outline-none text-xs" placeholder="ПАРОЛЬ">
                        <div class="pt-4 space-y-3">
                            <button data-action="login" class="w-full p-5 border-2 border-black rounded-3xl font-black uppercase text-xs">Войти</button>
                            <button data-action="reg" class="w-full p-5 bg-black text-white rounded-3xl font-black uppercase text-xs">Создать аккаунт</button>
                        </div>
                    </div>
                </div>`;
        }

        function render() {
            if(!state.profile) return;
            const s = state;
            document.getElementById('app').innerHTML = `
                <header class="pt-14 px-8 pb-4 flex justify-between items-end border-b border-gray-50 dark:border-zinc-900 sticky top-0 z-50 bg-inherit">
                    <div>
                        <h2 class="text-2xl font-black italic uppercase tracking-tighter">Hafland</h2>
                        <p class="text-[8px] font-bold opacity-30 uppercase">${s.viewProfile ? 'Profile' : (s.chatMode ? 'Direct' : s.tab)}</p>
                    </div>
                    <div class="px-3 py-1 rounded-full border border-gray-100 dark:border-zinc-800 font-black text-[10px]">${s.profile.stars} S</div>
                </header>

                <main class="content-scroll">${renderPage()}</main>

                ${s.showConsole ? renderConsole() : ''}

                <nav class="glass-nav">
                    <button data-action="setTab" data-param="chats" class="flex-1 flex flex-col items-center">
                        <i data-lucide="message-square" class="${s.tab==='chats'?'opacity-100':'opacity-20'}"></i>
                    </button>
                    <button data-action="setTab" data-param="market" class="flex-1 flex flex-col items-center">
                        <i data-lucide="shopping-bag" class="${s.tab==='market'?'opacity-100':'opacity-20'}"></i>
                    </button>
                    <button data-action="setTab" data-param="profile" class="flex-1 flex flex-col items-center">
                        <i data-lucide="user" class="${s.tab==='profile'?'opacity-100':'opacity-20'}"></i>
                    </button>
                </nav>
            `;
            lucide.createIcons();
            const box = document.getElementById('chat-box'); if(box) box.scrollTop = box.scrollHeight;
        }

        function renderPage() {
            const s = state;
            if(s.viewProfile) {
                const u = s.users.find(x => x.uid === s.viewProfile);
                if(!u) return '';
                return `
                    <div class="p-8 flex flex-col items-center">
                        <button data-action="openProfile" data-param="null" class="self-start text-[10px] font-black uppercase mb-8 flex items-center gap-2">
                            <i data-lucide="chevron-left" size="14"></i> Назад
                        </button>
                        <div class="w-28 h-28 rounded-[40px] bg-gray-50 dark:bg-zinc-900 flex items-center justify-center overflow-hidden mb-6 border-4 ${u.frame==='neon'?'frame-neon':(u.frame==='gold'?'frame-gold':'border-transparent')}">
                            ${u.avatar ? `<img src="${u.avatar}" class="w-full h-full object-cover">` : `<span class="text-4xl font-black">${u.username[0].toUpperCase()}</span>`}
                        </div>
                        <h3 class="text-3xl font-black uppercase nick-${u.nickStyle}">${u.username}</h3>
                        <p class="text-[9px] font-bold opacity-30 mt-1 uppercase tracking-widest">${u.tag || 'Haflander'}</p>
                        
                        <div class="grid grid-cols-2 gap-3 w-full mt-10">
                            <button data-action="openChat" data-param="${u.uid}" class="p-4 bg-black text-white rounded-2xl font-black uppercase text-[10px]">Написать</button>
                            <button class="p-4 border border-gray-100 dark:border-zinc-800 rounded-2xl font-black uppercase text-[10px] opacity-30 italic">Передать S</button>
                        </div>
                    </div>`;
            }

            if(s.chatMode) {
                const msgs = s.messages.filter(m => s.isGroup ? m.to === s.chatMode : ((m.from===s.profile.uid&&m.to===s.chatMode) || (m.from===s.chatMode&&m.to===s.profile.uid) || (m.from==='anon'&&m.to===s.chatMode)));
                const chatWith = s.isGroup ? s.groups.find(g => g.id === s.chatMode)?.name : s.users.find(u => u.uid === s.chatMode)?.username;
                
                return `
                    <div class="flex flex-col h-full px-6 pt-2">
                        <div class="flex justify-between items-center mb-6">
                            <button data-action="openChat" data-param="null" class="text-[10px] font-black uppercase opacity-30">Закрыть</button>
                            <div class="text-center">
                                <p class="text-[11px] font-black uppercase tracking-tighter">${chatWith || 'Чат'}</p>
                            </div>
                            <button data-action="toggleAnon" class="text-[10px] font-black uppercase ${s.anonMode?'text-green-500':'opacity-30'}">Anon</button>
                        </div>
                        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 pb-4">
                            ${msgs.map(m => `
                                <div class="flex ${m.from === s.profile.uid ? 'justify-end' : 'justify-start'}">
                                    <div class="${m.isAnon ? 'msg-anon' : (m.from === s.profile.uid ? 'msg-me' : 'msg-them')} p-4 max-w-[80%] text-xs shadow-sm">
                                        <div class="text-[7px] font-black uppercase opacity-40 mb-1">${m.sender}</div>
                                        <div class="leading-relaxed">${m.text}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="py-4 flex gap-2">
                            <input id="msg-input" class="flex-1 bg-gray-50 dark:bg-zinc-900 p-5 rounded-3xl text-xs outline-none" placeholder="Сообщение...">
                            <button data-action="sendMsg" class="w-14 h-14 bg-black text-white rounded-3xl flex items-center justify-center font-black">↑</button>
                        </div>
                    </div>`;
            }

            if(s.tab === 'chats') {
                return `
                    <div class="p-6">
                        <div class="flex gap-2 mb-6">
                            <button data-action="setSubTab" data-param="users" class="flex-1 p-4 rounded-2xl font-black uppercase text-[10px] ${s.subTab==='users'?'bg-black text-white':'bg-gray-50 dark:bg-zinc-900 opacity-40'}">Люди</button>
                            <button data-action="setSubTab" data-param="groups" class="flex-1 p-4 rounded-2xl font-black uppercase text-[10px] ${s.subTab==='groups'?'bg-black text-white':'bg-gray-50 dark:bg-zinc-900 opacity-40'}">Группы</button>
                        </div>
                        <div class="space-y-3">
                            ${s.subTab === 'users' ? s.users.filter(u => u.uid !== s.profile.uid).map(u => `
                                <div data-action="openChat" data-param="${u.uid}" class="p-4 card-flat flex items-center gap-4 cursor-pointer">
                                    <div data-action="openProfile" data-param="${u.uid}" class="w-12 h-12 rounded-2xl bg-gray-50 dark:bg-zinc-900 overflow-hidden flex items-center justify-center font-black ${u.frame==='neon'?'frame-neon':(u.frame==='gold'?'frame-gold':'')}">
                                        ${u.avatar ? `<img src="${u.avatar}" class="w-full h-full object-cover">` : u.username[0].toUpperCase()}
                                    </div>
                                    <div class="flex-1">
                                        <h4 class="text-xs font-black uppercase nick-${u.nickStyle}">${u.username}</h4>
                                        <p class="text-[8px] font-bold opacity-30 uppercase">${u.premium ? 'Ghost Mode' : 'Online'}</p>
                                    </div>
                                </div>
                            `).join('') : '<p class="text-center opacity-20 text-[10px] font-black py-20">ГРУПП ПОКА НЕТ</p>'}
                        </div>
                    </div>`;
            }

            if(s.tab === 'market') {
                return `
                    <div class="p-6 space-y-6">
                        <div class="p-6 card-flat bg-black text-white flex justify-between items-center" data-action="buyItem" data-param="premium" data-param2="700" data-val="true">
                            <div>
                                <h3 class="font-black italic uppercase text-sm">Hafland Premium</h3>
                                <p class="text-[8px] opacity-60 uppercase">Бесплатная анонимка + Ghost Mode</p>
                            </div>
                            <span class="font-black text-xs">700 S</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div class="p-4 card-flat text-center" data-action="buyItem" data-param="nickStyle" data-param2="150" data-val="gold">
                                <p class="nick-gold text-[10px] uppercase font-black">Gold Nick</p>
                                <p class="text-[8px] opacity-30 mt-1">150 S</p>
                            </div>
                            <div class="p-4 card-flat text-center" data-action="buyItem" data-param="nickStyle" data-param2="150" data-val="neon">
                                <p class="nick-neon text-[10px] uppercase font-black">Neon Nick</p>
                                <p class="text-[8px] opacity-30 mt-1">150 S</p>
                            </div>
                        </div>
                    </div>`;
            }

            if(s.tab === 'profile') {
                return `
                    <div class="p-10 flex flex-col items-center">
                        <div data-action="changeAvatar" class="w-32 h-32 rounded-[45px] bg-gray-50 dark:bg-zinc-900 border-4 overflow-hidden flex items-center justify-center text-4xl font-black mb-6 ${s.profile.frame==='neon'?'frame-neon':(s.profile.frame==='gold'?'frame-gold':'border-transparent')}">
                            ${s.profile.avatar ? `<img src="${s.profile.avatar}" class="w-full h-full object-cover">` : s.profile.username[0].toUpperCase()}
                        </div>
                        <h2 class="text-3xl font-black uppercase nick-${s.profile.nickStyle}">${s.profile.username}</h2>
                        <p class="text-[9px] font-black opacity-30 mt-2 tracking-widest uppercase">${s.profile.premium ? 'Premium User' : 'Basic User'}</p>

                        <div class="mt-10 w-full space-y-3">
                            <button data-action="changeAvatar" class="w-full p-5 card-flat font-black uppercase text-[10px] flex justify-between items-center">
                                Изменить аватар <span><i data-lucide="image" size="14"></i></span>
                            </button>
                            <button data-action="toggleTheme" class="w-full p-5 card-flat font-black uppercase text-[10px] flex justify-between items-center">
                                Сменить тему <span><i data-lucide="moon" size="14"></i></span>
                            </button>
                            <button data-action="logout" class="w-full p-5 border border-red-50 text-red-500 rounded-3xl font-black uppercase text-[10px]">Выйти</button>
                        </div>
                    </div>`;
            }
        }

        function renderConsole() {
            return `
                <div class="modal-overlay">
                    <div class="console-box flex flex-col h-[60vh]">
                        <div class="flex justify-between items-center mb-4 border-b border-zinc-800 pb-3">
                            <span class="text-[10px] font-bold uppercase opacity-50 italic">Hafland Shell</span>
                            <button data-action="toggleConsole" data-param="false" class="text-white">✕</button>
                        </div>
                        <div class="flex-1 overflow-y-auto text-[10px] opacity-80">
                            ${state.consoleLogs.map(l=>`<div>${l}</div>`).join('')}
                        </div>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
