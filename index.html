<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hafland Evolution 3.9.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --border: #eeeeee; --card: #ffffff; --glass: rgba(255, 255, 255, 0.9); }
        .dark { --bg: #000000; --text: #ffffff; --border: #1a1a1a; --card: #0a0a0a; --glass: rgba(0, 0, 0, 0.9); }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; -webkit-tap-highlight-color: transparent; }
        
        .glass-nav { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); z-index: 100; position: fixed; bottom: 0; left: 0; right: 0; height: calc(75px + env(safe-area-inset-bottom)); display: flex; justify-content: space-around; align-items: flex-start; padding-top: 12px; }
        .content-scroll { height: calc(100vh - 150px); overflow-y: auto; padding-bottom: 120px; }
        .content-scroll::-webkit-scrollbar { display: none; }
        
        .msg-me { background: var(--text); color: var(--bg); border-radius: 18px 18px 4px 18px; border: 1px solid var(--text); }
        .msg-them { background: var(--card); color: var(--text); border-radius: 18px 18px 18px 4px; border: 1px solid var(--border); }
        .msg-anon { background: #000; color: #00ff00; border-radius: 18px; font-family: monospace; border: 1px dashed #333; }
        
        .nick-gold { color: #ffd700; font-weight: 800; text-shadow: 0 0 5px rgba(255,215,0,0.3); }
        .nick-neon { color: #00f2ff; text-shadow: 0 0 8px #00f2ff; font-weight: 800; }
        .nick-rainbow { background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .nick-fire { color: #ff4500; font-weight: 900; text-shadow: 0 0 10px #ff4500; }
        
        .frame-neon { outline: 3px solid #00f2ff; outline-offset: -2px; }
        .frame-gold { outline: 3px solid #ffd700; outline-offset: -2px; }
        .frame-blood { outline: 3px solid #ff0000; outline-offset: -2px; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-card { background: var(--bg); border: 1px solid var(--border); border-radius: 32px; width: 100%; max-width: 400px; padding: 24px; }
        .console-box { background: #000 !important; color: #0f0 !important; font-family: 'Courier New', monospace; width: 100%; max-width: 500px; border-radius: 24px; padding: 20px; border: 1px solid #333; z-index: 3000; }
        
        button:active { transform: scale(0.96); opacity: 0.8; }
        .card-flat { background: var(--card); border: 1px solid var(--border); border-radius: 24px; }
        .btn-white { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
        .btn-black { background: var(--text); color: var(--bg); }
        
        .task-card { border: 1px solid var(--border); border-radius: 24px; padding: 16px; transition: all 0.2s; }
        .task-done { opacity: 0.5; background: #f8f8f8; }
    </style>
</head>
<body class="light">
    <div id="app" class="h-full flex flex-col relative"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAkgC4melkEcj0pDywonPG3aAeE3vACoF0", 
            authDomain: "hafland-c8dc3.firebaseapp.com", 
            projectId: "hafland-c8dc3", 
            storageBucket: "hafland-c8dc3.firebasestorage.app", 
            messagingSenderId: "163991622474", 
            appId: "1:163991622474:web:06a7357e295c9a98b327b3" 
        };

        const fApp = initializeApp(firebaseConfig);
        const auth = getAuth(fApp);
        const db = getFirestore(fApp);
        const APP_ID = "hafland_v3_stable";

        window.state = {
            user: null, profile: null, tab: 'chats', subTab: 'users', chatMode: null, isGroup: false,
            viewProfile: null, messages: [], users: [], groups: [],
            anonMode: false, showConsole: false, consoleLogs: ['> Hafland OS v3.9.0 initialized'],
            nftProcess: { step: 0, image: null, target: null, isAnon: false }
        };

        const actions = {
            setTab: (t) => { state.tab = t; state.chatMode = null; state.viewProfile = null; render(); },
            setSubTab: (t) => { state.subTab = t; render(); },
            openChat: (id, isGroup = false) => { state.chatMode = id === 'null' ? null : id; state.isGroup = isGroup; state.viewProfile = null; render(); },
            openProfile: (uid) => { state.viewProfile = uid === 'null' ? null : uid; state.chatMode = null; render(); },
            toggleAnon: () => { state.anonMode = !state.anonMode; render(); },
            toggleConsole: (v) => { state.showConsole = v; render(); },
            
            sendMsg: async () => {
                const el = document.getElementById('msg-input');
                const val = el?.value.trim();
                if(!val || !state.chatMode) return;
                const isAnon = state.anonMode;
                if(isAnon && !state.profile.premium) {
                    if(state.profile.stars < 50) return alert("Нужно 50 S");
                    await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), { stars: increment(-50) });
                }
                await addDoc(collection(db, 'artifacts', APP_ID, 'messages'), {
                    from: isAnon ? 'anon' : state.profile.uid,
                    to: state.chatMode, isGroup: state.isGroup, text: val,
                    sender: isAnon ? 'Аноним' : state.profile.username,
                    time: Date.now(), isAnon: isAnon
                });
                
                // Задание: Напиши 10 сообщений
                let updates = { xp: increment(10), msgCount: increment(1) };
                if(!state.profile.tasks?.findFriends && (state.profile.msgCount || 0) + 1 >= 10) {
                    updates.stars = increment(50);
                    updates['tasks.findFriends'] = true;
                    alert("Задание выполнено: Найди друзей! +50 S");
                }
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), updates);
                el.value = '';
            },

            transferStars: async () => {
                const amt = parseInt(prompt("Сколько S передать?"));
                if(!amt || amt <= 0) return;
                if(state.profile.stars < amt) return alert("Мало S");
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), { stars: increment(-amt) });
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.viewProfile), { stars: increment(amt) });
                alert("Передано!");
            },

            changeAvatar: () => {
                const input = document.createElement('input');
                input.type = 'file'; input.accept = 'image/*';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = async () => {
                        let updates = { avatar: reader.result };
                        // Задание: Поставь аватарку
                        if(!state.profile.tasks?.setAvatar) {
                            updates.stars = increment(100);
                            updates['tasks.setAvatar'] = true;
                            alert("Задание выполнено: Аватарка! +100 S");
                        }
                        await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), updates);
                    };
                    reader.readAsDataURL(file);
                };
                input.click();
            },

            buyItem: async (field, basePrice, val) => {
                const price = state.profile.premium ? Math.floor(basePrice * 0.8) : basePrice;
                if(state.profile.stars < price) return alert("Нужно " + price + " S");
                
                let updates = { stars: increment(-price), [field]: field === 'premium' ? true : val };
                
                // Задание: Первая покупка
                if(!state.profile.tasks?.firstBuy) {
                    updates.stars = increment(200 - price); // Награда 200 за вычетом цены
                    updates['tasks.firstBuy'] = true;
                    alert("Задание выполнено: Первая покупка! +200 S");
                }
                
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), updates);
                alert("Успешно куплено!");
            },

            startNft: () => {
                const input = document.createElement('input');
                input.type = 'file'; input.accept = 'image/*';
                input.onchange = (e) => {
                    const reader = new FileReader();
                    reader.onload = () => {
                        state.nftProcess = { step: 1, image: reader.result, target: null, isAnon: false };
                        render();
                    };
                    reader.readAsDataURL(e.target.files[0]);
                };
                input.click();
            },

            finishNft: async () => {
                const basePrice = 500;
                const price = state.profile.premium ? Math.floor(basePrice * 0.8) : basePrice;
                if(state.profile.stars < price) return alert("Нужно " + price + " S");
                
                let updates = { stars: increment(-price) };
                if(!state.profile.tasks?.firstBuy) { updates.stars = increment(200 - price); updates['tasks.firstBuy'] = true; alert("Задание выполнено: Первая покупка! +200 S"); }
                
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), updates);
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.nftProcess.target), {
                    nfts: arrayUnion({ 
                        img: state.nftProcess.image, 
                        from: state.nftProcess.isAnon ? 'Anon' : state.profile.username,
                        time: Date.now()
                    })
                });
                state.nftProcess.step = 0;
                alert("NFT Отправлен!");
                render();
            },

            runCommand: (cmd) => {
                const c = cmd.toLowerCase().trim();
                state.consoleLogs.push(`<span class="text-white">root@hafa168:~$</span> ${c}`);
                if(c === 'hafastars') {
                    updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), { stars: 999999 });
                    state.consoleLogs.push("Stars memory address modified to 0xFFFFFF");
                } else if(c === 'hafachat') {
                    state.consoleLogs.push("Fetching packet logs...");
                    state.messages.forEach(m => state.consoleLogs.push(`[${m.sender} -> ${m.to}]: ${m.text}`));
                } else if(c === 'clear') {
                    state.consoleLogs = ['> Console cleared.'];
                } else {
                    state.consoleLogs.push("Command not found.");
                }
                render();
                setTimeout(() => {
                   const logBox = document.getElementById('console-logs');
                   if(logBox) logBox.scrollTop = logBox.scrollHeight;
                }, 50);
            }
        };

        // Event Handling
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if(!btn) return;
            const act = btn.getAttribute('data-action');
            const p1 = btn.getAttribute('data-param');
            const p2 = btn.getAttribute('data-param2');
            const val = btn.getAttribute('data-val');
            
            if(act === 'setTab') actions.setTab(p1);
            if(act === 'setSubTab') actions.setSubTab(p1);
            if(act === 'openChat') actions.openChat(p1, p2 === 'true');
            if(act === 'openProfile') actions.openProfile(p1);
            if(act === 'sendMsg') actions.sendMsg();
            if(act === 'toggleAnon') actions.toggleAnon();
            if(act === 'toggleConsole') actions.toggleConsole(p1 === 'true');
            if(act === 'changeAvatar') actions.changeAvatar();
            if(act === 'buyItem') actions.buyItem(p1, parseInt(p2), val);
            if(act === 'transferStars') actions.transferStars();
            if(act === 'startNft') actions.startNft();
            if(act === 'selectNftTarget') { state.nftProcess.target = p1; state.nftProcess.step = 2; render(); }
            if(act === 'confirmNft') { state.nftProcess.isAnon = p1 === 'true'; actions.finishNft(); }
            if(act === 'logout') { localStorage.clear(); location.reload(); }
            if(act === 'toggleTheme') updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), { darkMode: !state.profile.darkMode });
            if(act === 'login' || act === 'reg') handleAuth(act);
            if(act === 'copyRef') {
                const link = `https://hafland.io/?ref=${state.profile.username}`;
                const el = document.createElement('textarea'); el.value = link; document.body.appendChild(el); el.select();
                document.execCommand('copy'); document.body.removeChild(el);
                alert("Ссылка скопирована!");
            }
        });

        async function handleAuth(mode) {
            const n = document.getElementById('a-nick').value.trim().toLowerCase();
            const p = document.getElementById('a-pass').value.trim();
            if(!n || !p) return;
            const regRef = doc(db, 'artifacts', APP_ID, 'registry', n);
            const regSnap = await getDoc(regRef);
            
            // Проверка реферала в URL
            const urlParams = new URLSearchParams(window.location.search);
            const refOwner = urlParams.get('ref');

            if(mode === 'login') {
                if(regSnap.exists() && regSnap.data().pass === p) {
                    localStorage.setItem('haf_nick', n); localStorage.setItem('haf_pass', p);
                    initListeners(regSnap.data().uid);
                } else alert("Ошибка входа");
            } else {
                if(regSnap.exists()) return alert("Никнейм занят");
                const uid = auth.currentUser.uid;
                await setDoc(regRef, { uid, pass: p });
                await setDoc(doc(db, 'artifacts', APP_ID, 'users', uid), {
                    uid, username: n, pass: p, stars: 100, tag: 'USER', nfts: [], avatar: null,
                    premium: (n === 'hafa168'), nickStyle: 'normal', level: 1, xp: 0, darkMode: false, frame: 'none',
                    tasks: {}, msgCount: 0
                });
                
                // Выплата рефералу
                if(refOwner) {
                    const ownerRef = doc(db, 'artifacts', APP_ID, 'registry', refOwner.toLowerCase());
                    const ownerSnap = await getDoc(ownerRef);
                    if(ownerSnap.exists()) {
                        await updateDoc(doc(db, 'artifacts', APP_ID, 'users', ownerSnap.data().uid), { stars: increment(50) });
                    }
                }

                localStorage.setItem('haf_nick', n); localStorage.setItem('haf_pass', p);
                initListeners(uid);
            }
        }

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                state.user = u;
                const sn = localStorage.getItem('haf_nick'), sp = localStorage.getItem('haf_pass');
                if(sn && sp) {
                    const r = await getDoc(doc(db, 'artifacts', APP_ID, 'registry', sn.toLowerCase()));
                    if(r.exists() && r.data().pass === sp) initListeners(r.data().uid);
                    else renderAuth();
                } else renderAuth();
            } else { await signInAnonymously(auth); }
        });

        function initListeners(uid) {
            onSnapshot(doc(db, 'artifacts', APP_ID, 'users', uid), (s) => { if(s.exists()) { state.profile = s.data(); document.body.className = state.profile.darkMode ? 'dark' : 'light'; render(); } });
            onSnapshot(collection(db, 'artifacts', APP_ID, 'users'), (s) => { state.users = s.docs.map(d => d.data()); render(); });
            onSnapshot(collection(db, 'artifacts', APP_ID, 'messages'), (s) => { state.messages = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.time - b.time); render(); });
        }

        function renderAuth() {
            document.getElementById('app').innerHTML = `
                <div class="h-full flex flex-col items-center justify-center p-10">
                    <h1 class="text-5xl font-black italic tracking-tighter mb-4">Hafland</h1>
                    <p class="text-[10px] opacity-40 font-bold uppercase mb-12 text-center leading-relaxed">Безопасная сеть. Шифрование данных.<br>Ник и пароль только на английском.</p>
                    <div class="w-full max-w-xs space-y-3">
                        <input id="a-nick" class="w-full p-5 rounded-3xl border border-gray-100 text-center font-bold outline-none uppercase text-xs" placeholder="НИКНЕЙМ (ENG)">
                        <input id="a-pass" type="password" class="w-full p-5 rounded-3xl border border-gray-100 text-center font-bold outline-none text-xs" placeholder="ПАРОЛЬ">
                        <div class="pt-4 space-y-3">
                            <button data-action="login" class="w-full p-5 border-2 border-black rounded-3xl font-black uppercase text-xs">Войти</button>
                            <button data-action="reg" class="w-full p-5 bg-black text-white rounded-3xl font-black uppercase text-xs">Создать аккаунт</button>
                        </div>
                    </div>
                </div>`;
        }

        function render() {
            if(!state.profile) return;
            const s = state;
            document.getElementById('app').innerHTML = `
                <header class="pt-14 px-8 pb-4 flex justify-between items-end border-b border-gray-50 dark:border-zinc-900 sticky top-0 z-50 bg-inherit">
                    <div><h2 class="text-2xl font-black italic uppercase tracking-tighter">Hafland</h2><p class="text-[8px] font-bold opacity-30 uppercase">${s.tab}</p></div>
                    <div class="px-3 py-1 rounded-full border border-gray-100 dark:border-zinc-800 font-black text-[10px]">${s.profile.stars} S</div>
                </header>
                <main class="content-scroll">${renderPage()}</main>
                ${s.showConsole ? renderConsole() : ''}
                ${s.nftProcess.step > 0 ? renderNftModal() : ''}
                <nav class="glass-nav">
                    <button data-action="setTab" data-param="chats" class="flex-1 flex flex-col items-center"><i data-lucide="message-square" class="${s.tab==='chats'?'opacity-100':'opacity-20'}"></i></button>
                    <button data-action="setTab" data-param="tasks" class="flex-1 flex flex-col items-center"><i data-lucide="list-checks" class="${s.tab==='tasks'?'opacity-100':'opacity-20'}"></i></button>
                    <button data-action="setTab" data-param="market" class="flex-1 flex flex-col items-center"><i data-lucide="shopping-bag" class="${s.tab==='market'?'opacity-100':'opacity-20'}"></i></button>
                    <button data-action="setTab" data-param="profile" class="flex-1 flex flex-col items-center"><i data-lucide="user" class="${s.tab==='profile'?'opacity-100':'opacity-20'}"></i></button>
                </nav>
            `;
            lucide.createIcons();
            const box = document.getElementById('chat-box'); if(box) box.scrollTop = box.scrollHeight;
        }

        function renderPage() {
            const s = state;
            if(s.viewProfile) {
                const u = s.users.find(x => x.uid === s.viewProfile);
                if(!u) return '';
                return `
                    <div class="p-8 flex flex-col items-center">
                        <button data-action="openProfile" data-param="null" class="self-start text-[10px] font-black uppercase mb-8 flex items-center gap-2"><i data-lucide="chevron-left" size="14"></i> Назад</button>
                        <div class="w-28 h-28 rounded-[40px] bg-gray-50 dark:bg-zinc-900 flex items-center justify-center overflow-hidden mb-6 border-4 ${u.frame==='neon'?'frame-neon':(u.frame==='gold'?'frame-gold':(u.frame==='blood'?'frame-blood':'border-transparent'))}">${u.avatar ? `<img src="${u.avatar}" class="w-full h-full object-cover">` : `<span class="text-4xl font-black">${u.username[0].toUpperCase()}</span>`}</div>
                        <h3 class="text-3xl font-black uppercase nick-${u.nickStyle}">${u.username}</h3>
                        <div class="grid grid-cols-2 gap-3 w-full mt-10">
                            <button data-action="openChat" data-param="${u.uid}" class="p-4 btn-black rounded-2xl font-black uppercase text-[10px]">Написать</button>
                            <button data-action="transferStars" class="p-4 btn-white rounded-2xl font-black uppercase text-[10px]">Передать S</button>
                        </div>
                        <div class="w-full mt-10">
                            <p class="text-[9px] font-black uppercase opacity-20 mb-4">NFT Коллеция</p>
                            <div class="grid grid-cols-3 gap-2">
                                ${(u.nfts || []).map(n => `<div class="aspect-square card-flat overflow-hidden shadow-sm"><img src="${n.img}" class="w-full h-full object-cover"></div>`).join('')}
                            </div>
                        </div>
                    </div>`;
            }

            if(s.chatMode) {
                const msgs = s.messages.filter(m => s.isGroup ? m.to === s.chatMode : ((m.from===s.profile.uid&&m.to===s.chatMode) || (m.from===s.chatMode&&m.to===s.profile.uid) || (m.from==='anon'&&m.to===s.chatMode)));
                const chatWith = s.users.find(u => u.uid === s.chatMode)?.username;
                return `
                    <div class="flex flex-col h-full px-6 pt-2">
                        <div class="flex justify-between items-center mb-6">
                            <button data-action="openChat" data-param="null" class="text-[10px] font-black uppercase opacity-30">Закрыть</button>
                            <div class="text-center"><p class="text-[11px] font-black uppercase tracking-tighter">${chatWith || 'Чат'}</p></div>
                            <button data-action="toggleAnon" class="text-[10px] font-black uppercase ${s.anonMode?'text-green-500':'opacity-30'}">Anon</button>
                        </div>
                        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 pb-4">${msgs.map(m => `<div class="flex ${m.from === s.profile.uid ? 'justify-end' : 'justify-start'}"><div class="${m.isAnon ? 'msg-anon' : (m.from === s.profile.uid ? 'msg-me' : 'msg-them')} p-4 max-w-[80%] text-xs shadow-sm"><div class="text-[7px] font-black uppercase opacity-40 mb-1">${m.sender}</div><div class="leading-relaxed">${m.text}</div></div></div>`).join('')}</div>
                        <div class="py-4 flex gap-2"><input id="msg-input" class="flex-1 bg-gray-50 dark:bg-zinc-900 p-5 rounded-3xl text-xs outline-none" placeholder="Сообщение..."><button data-action="sendMsg" class="w-14 h-14 btn-black rounded-3xl flex items-center justify-center font-black">↑</button></div>
                    </div>`;
            }

            if(s.tab === 'chats') {
                return `<div class="p-6"><div class="space-y-3">${s.users.filter(u => u.uid !== s.profile.uid).map(u => `<div data-action="openChat" data-param="${u.uid}" class="p-4 card-flat flex items-center gap-4 cursor-pointer"><div data-action="openProfile" data-param="${u.uid}" class="w-12 h-12 rounded-2xl bg-gray-50 overflow-hidden flex items-center justify-center font-black ${u.frame==='neon'?'frame-neon':(u.frame==='gold'?'frame-gold':'')}">${u.avatar ? `<img src="${u.avatar}" class="w-full h-full object-cover">` : u.username[0].toUpperCase()}</div><div class="flex-1"><h4 class="text-xs font-black uppercase nick-${u.nickStyle}">${u.username}</h4><p class="text-[8px] font-bold opacity-30 uppercase">${u.premium ? 'Ghost' : 'Online'}</p></div></div>`).join('')}</div></div>`;
            }

            if(s.tab === 'tasks') {
                const t = s.profile.tasks || {};
                return `
                    <div class="p-6 space-y-4">
                        <div class="task-card flex justify-between items-center bg-black text-white" data-action="copyRef">
                            <div><h3 class="font-black uppercase text-[11px]">Пригласи друзей!</h3><p class="text-[8px] opacity-60 mt-1 uppercase">Твоя ссылка: Жми, чтобы скопировать. +50 S за каждого</p></div>
                            <span class="font-black text-[10px]">50 S</span>
                        </div>
                        <div class="task-card flex justify-between items-center ${t.setAvatar ? 'task-done' : ''}">
                            <div><h3 class="font-black uppercase text-[11px]">Поставь Аватарку!</h3><p class="text-[8px] opacity-30 mt-1 uppercase">Зайди в профиль и нажми на фото. Награда один раз.</p></div>
                            <span class="font-black text-[10px]">100 S</span>
                        </div>
                        <div class="task-card flex justify-between items-center ${t.findFriends ? 'task-done' : ''}">
                            <div><h3 class="font-black uppercase text-[11px]">Найди друзей!</h3><p class="text-[8px] opacity-30 mt-1 uppercase">Напиши 10 сообщений в любые чаты (${s.profile.msgCount || 0}/10)</p></div>
                            <span class="font-black text-[10px]">50 S</span>
                        </div>
                        <div class="task-card flex justify-between items-center ${t.firstBuy ? 'task-done' : ''}">
                            <div><h3 class="font-black uppercase text-[11px]">Первая покупка!</h3><p class="text-[8px] opacity-30 mt-1 uppercase">Купи любой предмет в магазине и получи кешбэк.</p></div>
                            <span class="font-black text-[10px]">200 S</span>
                        </div>
                    </div>`;
            }

            if(s.tab === 'market') {
                const isPrem = s.profile.premium;
                return `
                    <div class="p-6 space-y-6">
                        <div class="p-6 card-flat bg-black text-white flex justify-between items-center" data-action="buyItem" data-param="premium" data-param2="700">
                            <div><h3 class="font-black italic uppercase text-sm">Premium</h3><p class="text-[8px] opacity-60 uppercase">Anon Free + Ghost + 20% OFF</p></div>
                            <span class="font-black text-xs">700 S</span>
                        </div>
                        <div class="p-6 card-flat flex justify-between items-center" data-action="startNft">
                            <div><h3 class="font-black uppercase text-sm">Создать NFT</h3><p class="text-[8px] opacity-30 uppercase">Отправь картинку любому пользователю</p></div>
                            <span class="font-black text-xs">${isPrem ? 400 : 500} S</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="p-4 card-flat text-center" data-action="buyItem" data-param="nickStyle" data-param2="150" data-val="gold"><p class="nick-gold text-[9px] uppercase font-black">Gold Nick</p></div>
                            <div class="p-4 card-flat text-center" data-action="buyItem" data-param="nickStyle" data-param2="150" data-val="fire"><p class="nick-fire text-[9px] uppercase font-black">Fire Nick</p></div>
                            <div class="p-4 card-flat text-center" data-action="buyItem" data-param="frame" data-param2="250" data-val="gold"><p class="text-[8px] font-black uppercase">Gold Frame</p></div>
                            <div class="p-4 card-flat text-center" data-action="buyItem" data-param="frame" data-param2="250" data-val="blood"><p class="text-[8px] font-black uppercase">Blood Frame</p></div>
                        </div>
                    </div>`;
            }

            if(s.tab === 'profile') {
                return `
                    <div class="p-10 flex flex-col items-center">
                        <div data-action="changeAvatar" class="w-32 h-32 rounded-[45px] bg-gray-50 border-4 overflow-hidden flex items-center justify-center text-4xl font-black mb-6 ${s.profile.frame==='neon'?'frame-neon':(s.profile.frame==='gold'?'frame-gold':(s.profile.frame==='blood'?'frame-blood':'border-transparent'))}">${s.profile.avatar ? `<img src="${s.profile.avatar}" class="w-full h-full object-cover">` : s.profile.username[0].toUpperCase()}</div>
                        <h2 class="text-3xl font-black uppercase nick-${s.profile.nickStyle}">${s.profile.username}</h2>
                        <div class="mt-10 w-full space-y-3">
                            <button data-action="changeAvatar" class="w-full p-5 card-flat font-black uppercase text-[10px] flex justify-between items-center">Аватар <i data-lucide="image" size="14"></i></button>
                            <button data-action="toggleTheme" class="w-full p-5 card-flat font-black uppercase text-[10px] flex justify-between items-center">Тема <i data-lucide="moon" size="14"></i></button>
                            ${s.profile.username === 'hafa168' ? `<button data-action="toggleConsole" data-param="true" class="w-full p-5 card-flat border-green-100 text-green-600 font-black uppercase text-[10px]">OS Shell</button>` : ''}
                            <button data-action="logout" class="w-full p-5 border border-red-50 text-red-500 rounded-3xl font-black uppercase text-[10px]">Выйти</button>
                        </div>
                    </div>`;
            }
        }

        function renderNftModal() {
            const s = state.nftProcess;
            return `<div class="modal-overlay"><div class="modal-card">
                ${s.step === 1 ? `
                    <h3 class="font-black uppercase text-[10px] mb-4">Кому отправить?</h3>
                    <div class="space-y-2 max-h-60 overflow-y-auto">
                        <div data-action="selectNftTarget" data-param="${state.profile.uid}" class="p-4 btn-white rounded-2xl font-black uppercase text-[10px]">Себе</div>
                        ${state.users.filter(u=>u.uid!==state.profile.uid).map(u=>`<div data-action="selectNftTarget" data-param="${u.uid}" class="p-4 btn-white rounded-2xl font-black uppercase text-[10px]">${u.username}</div>`).join('')}
                    </div>
                ` : `
                    <h3 class="font-black uppercase text-[10px] mb-6">Тип отправки</h3>
                    <div class="space-y-3">
                        <button data-action="confirmNft" data-param="false" class="w-full p-5 btn-black rounded-3xl font-black uppercase text-[10px]">Публично</button>
                        <button data-action="confirmNft" data-param="true" class="w-full p-5 btn-white rounded-3xl font-black uppercase text-[10px]">Анонимно</button>
                    </div>
                `}
            </div></div>`;
        }

        function renderConsole() {
            return `<div class="modal-overlay"><div class="console-box flex flex-col h-[60vh] relative">
                <div class="flex justify-between mb-4 border-b border-zinc-800 pb-3"><span class="text-[9px] font-bold">Hafland Shell v3.9</span><button data-action="toggleConsole" data-param="false">✕</button></div>
                <div id="console-logs" class="flex-1 overflow-y-auto text-[10px] opacity-80 font-mono">${state.consoleLogs.map(l=>`<div>${l}</div>`).join('')}</div>
                <div class="mt-4 border-t border-zinc-800 pt-3 flex gap-2">
                    <span class="text-green-500 font-mono text-[10px]">$</span>
                    <input id="shell-input" class="bg-transparent outline-none flex-1 text-[10px] font-mono text-green-400" autofocus onkeypress="if(event.key==='Enter'){ actions.runCommand(this.value); this.value=''}">
                </div>
            </div></div>`;
        }
    </script>
</body>
</html>
