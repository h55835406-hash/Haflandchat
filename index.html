<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hafland Evolution 4.2 Neon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --border: #eeeeee; --card: #ffffff; --glass: rgba(255, 255, 255, 0.9); }
        .dark { --bg: #000000; --text: #ffffff; --border: #1a1a1a; --card: #0a0a0a; --glass: rgba(0, 0, 0, 0.9); }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; -webkit-tap-highlight-color: transparent; }
        
        .glass-nav { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); z-index: 100; position: fixed; bottom: 0; left: 0; right: 0; height: calc(75px + env(safe-area-inset-bottom)); display: flex; justify-content: space-around; align-items: flex-start; padding-top: 12px; }
        .content-scroll { height: calc(100vh - 150px); overflow-y: auto; padding-bottom: 120px; }
        .content-scroll::-webkit-scrollbar { display: none; }
        
        /* Message Styles */
        .msg-me { background: var(--text); color: var(--bg); border-radius: 18px 18px 4px 18px; border: 1px solid var(--text); }
        .msg-them { background: var(--card); color: var(--text); border-radius: 18px 18px 18px 4px; border: 1px solid var(--border); }
        .msg-anon { background: #000; color: #00ff00; border-radius: 18px; font-family: monospace; border: 1px dashed #333; }
        
        /* Nickname Styles - FULL PALETTE */
        .nick-normal { font-weight: 600; }
        .nick-gold { color: #ffd700; font-weight: 800; text-shadow: 0 0 5px rgba(255,215,0,0.3); }
        .nick-rainbow { background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .nick-fire { color: #ff4500; font-weight: 900; text-shadow: 0 0 10px #ff4500; }
        .nick-veteran { color: #fff; background: #333; padding: 1px 6px; border-radius: 4px; font-weight: 700; }
        .nick-chatty { color: #ff00ff; text-decoration: underline; font-weight: 800; }

        /* Neon Nicks */
        .nick-neon-red { color: #ff0033; text-shadow: 0 0 8px #ff0033; font-weight: 800; }
        .nick-neon-orange { color: #ff6600; text-shadow: 0 0 8px #ff6600; font-weight: 800; }
        .nick-neon-yellow { color: #ffff00; text-shadow: 0 0 8px #ffff00; font-weight: 800; }
        .nick-neon-green { color: #39ff14; text-shadow: 0 0 8px #39ff14; font-weight: 800; }
        .nick-neon-cyan { color: #00ffff; text-shadow: 0 0 8px #00ffff; font-weight: 800; }
        .nick-neon-blue { color: #0070ff; text-shadow: 0 0 8px #0070ff; font-weight: 800; }
        .nick-neon-purple { color: #bc13fe; text-shadow: 0 0 8px #bc13fe; font-weight: 800; }
        .nick-neon-pink { color: #ff00ff; text-shadow: 0 0 8px #ff00ff; font-weight: 800; }

        /* Frames - FULL PALETTE */
        .frame-none { outline: none; }
        .frame-gold { outline: 3px solid #ffd700; outline-offset: -2px; }
        .frame-blood { outline: 3px solid #ff0000; outline-offset: -2px; }
        .frame-neon-red { outline: 3px solid #ff0033; outline-offset: -2px; box-shadow: inset 0 0 10px #ff0033; }
        .frame-neon-orange { outline: 3px solid #ff6600; outline-offset: -2px; box-shadow: inset 0 0 10px #ff6600; }
        .frame-neon-yellow { outline: 3px solid #ffff00; outline-offset: -2px; box-shadow: inset 0 0 10px #ffff00; }
        .frame-neon-green { outline: 3px solid #39ff14; outline-offset: -2px; box-shadow: inset 0 0 10px #39ff14; }
        .frame-neon-cyan { outline: 3px solid #00ffff; outline-offset: -2px; box-shadow: inset 0 0 10px #00ffff; }
        .frame-neon-blue { outline: 3px solid #0070ff; outline-offset: -2px; box-shadow: inset 0 0 10px #0070ff; }
        .frame-neon-purple { outline: 3px solid #bc13fe; outline-offset: -2px; box-shadow: inset 0 0 10px #bc13fe; }
        .frame-neon-pink { outline: 3px solid #ff00ff; outline-offset: -2px; box-shadow: inset 0 0 10px #ff00ff; }
        
        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-card { background: var(--bg); border: 1px solid var(--border); border-radius: 32px; width: 100%; max-width: 400px; padding: 24px; }
        .console-box { background: #000 !important; color: #0f0 !important; font-family: 'Courier New', monospace; width: 100%; max-width: 500px; border-radius: 24px; padding: 20px; border: 1px solid #333; z-index: 3000; }
        
        button:active { transform: scale(0.96); opacity: 0.8; }
        .card-flat { background: var(--card); border: 1px solid var(--border); border-radius: 24px; }
        .btn-black { background: var(--text); color: var(--bg); }
        .btn-white { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
        
        .task-card { border: 1px solid var(--border); border-radius: 24px; padding: 16px; transition: all 0.2s; }
        .task-done { opacity: 0.5; background: #f0f0f0 !important; color: #888 !important; cursor: default; pointer-events: none; }

        .xp-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; width: 100%; }
        .xp-progress { height: 100%; background: #000; transition: width 0.3s; }
        .dark .xp-progress { background: #fff; }
    </style>
</head>
<body class="light">
    <div id="app" class="h-full flex flex-col relative"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAkgC4melkEcj0pDywonPG3aAeE3vACoF0", 
            authDomain: "hafland-c8dc3.firebaseapp.com", 
            projectId: "hafland-c8dc3", 
            storageBucket: "hafland-c8dc3.firebasestorage.app", 
            messagingSenderId: "163991622474", 
            appId: "1:163991622474:web:06a7357e295c9a98b327b3" 
        };

        const fApp = initializeApp(firebaseConfig);
        const auth = getAuth(fApp);
        const db = getFirestore(fApp);
        const APP_ID = "hafland_v3_stable";

        window.state = {
            user: null, profile: null, tab: 'chats', chatMode: null, isGroup: false,
            viewProfile: null, messages: [], users: [],
            anonMode: false, showConsole: false, consoleLogs: ['> Hafland OS v4.2.0 (Neon Edition)'],
            nftProcess: { step: 0, image: null, target: null, isAnon: false }
        };

        const actions = {
            setTab: (t) => { state.tab = t; state.chatMode = null; state.viewProfile = null; render(); },
            openChat: (id, isGroup = false) => { state.chatMode = id === 'null' ? null : id; state.isGroup = isGroup; state.viewProfile = null; render(); },
            openProfile: (uid) => { state.viewProfile = uid === 'null' ? null : uid; state.chatMode = null; render(); },
            toggleAnon: () => { state.anonMode = !state.anonMode; render(); },
            toggleConsole: (v) => { state.showConsole = v; render(); },
            
            sendMsg: async () => {
                const el = document.getElementById('msg-input');
                const val = el?.value.trim();
                if(!val || !state.chatMode) return;
                
                const isAnon = state.anonMode;
                if(isAnon && !state.profile.premium) {
                    if(state.profile.stars < 50) return alert("Нужно 50 S");
                    await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), { stars: increment(-50) });
                }

                await addDoc(collection(db, 'artifacts', APP_ID, 'messages'), {
                    from: isAnon ? 'anon' : state.profile.uid,
                    to: state.chatMode, isGroup: state.isGroup, text: val,
                    sender: isAnon ? 'Аноним' : state.profile.username,
                    time: Date.now(), isAnon: isAnon
                });
                
                let updates = { xp: increment(25), msgCount: increment(1) };
                const curXp = (state.profile.xp || 0) + 25;
                if(curXp >= 1000) { updates.xp = 0; updates.level = increment(1); alert("Уровень повышен!"); }

                if(!state.profile.tasks?.findFriends && (state.profile.msgCount || 0) + 1 >= 10) {
                    updates.stars = (updates.stars || 0) + 50;
                    updates['tasks.findFriends'] = true;
                    alert("Задание выполнено: Общение! +50 S");
                }

                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), updates);
                el.value = '';
            },

            dailyBonus: async () => {
                const last = state.profile.tasks?.lastDaily || 0;
                if(Date.now() - last < 86400000) return alert("Приходи завтра!");
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), { 
                    stars: increment(50), 'tasks.lastDaily': Date.now() 
                });
                alert("Бонус 50 S получен!");
            },

            buyItem: async (field, basePrice, val, minLvl = 0) => {
                if((state.profile.level || 1) < minLvl) return alert(`Нужен ${minLvl} уровень!`);
                const finalPrice = state.profile.premium ? Math.floor(basePrice * 0.8) : basePrice;
                if(state.profile.stars < finalPrice) return alert(`Нужно ${finalPrice} S`);
                
                let updates = { stars: increment(-finalPrice), [field]: field === 'premium' ? true : val };
                if(!state.profile.tasks?.firstBuy) {
                    updates.stars = increment(200); updates['tasks.firstBuy'] = true;
                    alert("Задание выполнено: Первая покупка! +200 S");
                }
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), updates);
                alert("Покупка прошла успешно!");
            },

            runCommand: (cmd) => {
                const c = cmd.toLowerCase().trim();
                state.consoleLogs.push(`<span class="text-white">root@hafa168:~$</span> ${c}`);
                if(c === 'hafastars') {
                    updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), { stars: 999999 });
                    state.consoleLogs.push("Stars memory address modified.");
                } else if(c === 'hafachat') {
                    state.consoleLogs.push("Logs reading restricted to server-side.");
                } else if(c === 'clear') {
                    state.consoleLogs = ['> Console cleared.'];
                } else { state.consoleLogs.push("Unknown command."); }
                render();
            }
        };

        document.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if(!btn) return;
            const act = btn.getAttribute('data-action');
            const p1 = btn.getAttribute('data-param');
            const p2 = btn.getAttribute('data-param2');
            const val = btn.getAttribute('data-val');
            const lvl = parseInt(btn.getAttribute('data-lvl') || '0');
            
            if(act === 'setTab') actions.setTab(p1);
            if(act === 'openChat') actions.openChat(p1, p2 === 'true');
            if(act === 'openProfile') actions.openProfile(p1);
            if(act === 'sendMsg') actions.sendMsg();
            if(act === 'toggleAnon') actions.toggleAnon();
            if(act === 'toggleConsole') actions.toggleConsole(p1 === 'true');
            if(act === 'dailyBonus') actions.dailyBonus();
            if(act === 'buyItem') actions.buyItem(p1, parseInt(p2), val, lvl);
            if(act === 'logout') { localStorage.clear(); location.reload(); }
            if(act === 'toggleTheme') updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), { darkMode: !state.profile.darkMode });
            if(act === 'login' || act === 'reg') handleAuth(act);
            if(act === 'copyRef') {
                const link = `${window.location.origin}${window.location.pathname}?ref=${state.profile.username}`;
                const el = document.createElement('textarea'); el.value = link; document.body.appendChild(el); el.select();
                document.execCommand('copy'); document.body.removeChild(el); alert("Ссылка скопирована!");
            }
        });

        async function handleAuth(mode) {
            const n = document.getElementById('a-nick').value.trim().toLowerCase();
            const p = document.getElementById('a-pass').value.trim();
            if(!n || !p) return;
            const regRef = doc(db, 'artifacts', APP_ID, 'registry', n);
            const regSnap = await getDoc(regRef);
            
            if(mode === 'login') {
                if(regSnap.exists() && regSnap.data().pass === p) {
                    localStorage.setItem('haf_nick', n); localStorage.setItem('haf_pass', p);
                    initListeners(regSnap.data().uid);
                } else alert("Ошибка авторизации");
            } else {
                if(regSnap.exists()) return alert("Ник занят");
                const uid = auth.currentUser.uid;
                const refOwner = new URLSearchParams(window.location.search).get('ref');
                await setDoc(regRef, { uid, pass: p });
                await setDoc(doc(db, 'artifacts', APP_ID, 'users', uid), {
                    uid, username: n, stars: 100, nfts: [], avatar: null,
                    premium: (n === 'hafa168'), nickStyle: 'normal', level: 1, xp: 0, darkMode: false, frame: 'none',
                    tasks: {}, msgCount: 0
                });
                if(refOwner) {
                    const ownerRef = doc(db, 'artifacts', APP_ID, 'registry', refOwner.toLowerCase());
                    const ownerSnap = await getDoc(ownerRef);
                    if(ownerSnap.exists()) await updateDoc(doc(db, 'artifacts', APP_ID, 'users', ownerSnap.data().uid), { stars: increment(50) });
                }
                localStorage.setItem('haf_nick', n); localStorage.setItem('haf_pass', p);
                initListeners(uid);
            }
        }

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                state.user = u;
                const sn = localStorage.getItem('haf_nick'), sp = localStorage.getItem('haf_pass');
                if(sn && sp) {
                    const r = await getDoc(doc(db, 'artifacts', APP_ID, 'registry', sn.toLowerCase()));
                    if(r.exists() && r.data().pass === sp) initListeners(r.data().uid); else renderAuth();
                } else renderAuth();
            } else { 
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth); 
            }
        });

        function initListeners(uid) {
            onSnapshot(doc(db, 'artifacts', APP_ID, 'users', uid), (s) => { if(s.exists()) { state.profile = s.data(); document.body.className = state.profile.darkMode ? 'dark' : 'light'; render(); } });
            onSnapshot(collection(db, 'artifacts', APP_ID, 'users'), (s) => { state.users = s.docs.map(d => d.data()); render(); });
            onSnapshot(collection(db, 'artifacts', APP_ID, 'messages'), (s) => { state.messages = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.time - b.time); render(); });
        }

        function renderAuth() {
            document.getElementById('app').innerHTML = `
                <div class="h-full flex flex-col items-center justify-center p-10 bg-white dark:bg-black">
                    <h1 class="text-6xl font-black italic tracking-tighter mb-2">Hafland</h1>
                    <p class="text-[10px] opacity-40 font-bold uppercase mb-12 tracking-[0.2em]">Evolution 4.2 Neon</p>
                    <div class="w-full max-w-xs space-y-3">
                        <input id="a-nick" class="w-full p-5 rounded-3xl border border-gray-100 dark:border-zinc-800 text-center font-bold outline-none uppercase text-xs" placeholder="НИКНЕЙМ">
                        <input id="a-pass" type="password" class="w-full p-5 rounded-3xl border border-gray-100 dark:border-zinc-800 text-center font-bold outline-none text-xs" placeholder="ПАРОЛЬ">
                        <div class="pt-4 space-y-3">
                            <button data-action="login" class="w-full p-5 border-2 border-black dark:border-white rounded-3xl font-black uppercase text-xs">Войти</button>
                            <button data-action="reg" class="w-full p-5 bg-black dark:bg-white dark:text-black text-white rounded-3xl font-black uppercase text-xs">Создать</button>
                        </div>
                    </div>
                </div>`;
        }

        function render() {
            if(!state.profile) return;
            const s = state;
            document.getElementById('app').innerHTML = `
                <header class="pt-14 px-8 pb-4 flex justify-between items-end border-b border-gray-50 dark:border-zinc-900 sticky top-0 z-50 bg-inherit">
                    <div><h2 class="text-2xl font-black italic uppercase tracking-tighter">Hafland</h2><p class="text-[8px] font-bold opacity-30 uppercase">v4.2 • ${s.tab}</p></div>
                    <div class="px-4 py-2 rounded-2xl bg-gray-50 dark:bg-zinc-900 border border-gray-100 dark:border-zinc-800 font-black text-[11px]">${s.profile.stars} S</div>
                </header>
                <main class="content-scroll">${renderPage()}</main>
                ${s.showConsole ? renderConsole() : ''}
                <nav class="glass-nav">
                    <button data-action="setTab" data-param="chats" class="flex-1 flex flex-col items-center"><i data-lucide="message-square" class="${s.tab==='chats'?'opacity-100 text-black dark:text-white':'opacity-20'}"></i></button>
                    <button data-action="setTab" data-param="tasks" class="flex-1 flex flex-col items-center"><i data-lucide="list-checks" class="${s.tab==='tasks'?'opacity-100 text-black dark:text-white':'opacity-20'}"></i></button>
                    <button data-action="setTab" data-param="market" class="flex-1 flex flex-col items-center"><i data-lucide="shopping-bag" class="${s.tab==='market'?'opacity-100 text-black dark:text-white':'opacity-20'}"></i></button>
                    <button data-action="setTab" data-param="profile" class="flex-1 flex flex-col items-center"><i data-lucide="user" class="${s.tab==='profile'?'opacity-100 text-black dark:text-white':'opacity-20'}"></i></button>
                </nav>
            `;
            lucide.createIcons();
            const box = document.getElementById('chat-box'); if(box) box.scrollTop = box.scrollHeight;
        }

        function renderPage() {
            const s = state;
            const framesMap = { 
                'gold': 'frame-gold', 'blood': 'frame-blood', 
                'neon-red': 'frame-neon-red', 'neon-orange': 'frame-neon-orange', 'neon-yellow': 'frame-neon-yellow',
                'neon-green': 'frame-neon-green', 'neon-cyan': 'frame-neon-cyan', 'neon-blue': 'frame-neon-blue',
                'neon-purple': 'frame-neon-purple', 'neon-pink': 'frame-neon-pink'
            };
            
            if(s.viewProfile) {
                const u = s.users.find(x => x.uid === s.viewProfile);
                if(!u) return '';
                return `<div class="p-8 flex flex-col items-center">
                    <button data-action="openProfile" data-param="null" class="self-start text-[10px] font-black uppercase mb-8 flex items-center gap-2"><i data-lucide="arrow-left" size="14"></i> Назад</button>
                    <div class="w-32 h-32 rounded-[45px] bg-gray-50 dark:bg-zinc-900 flex items-center justify-center overflow-hidden mb-6 border-4 ${framesMap[u.frame] || 'border-transparent'}">
                        ${u.avatar ? `<img src="${u.avatar}" class="w-full h-full object-cover">` : `<span class="text-4xl font-black">${u.username[0].toUpperCase()}</span>`}
                    </div>
                    <h3 class="text-3xl font-black uppercase nick-${u.nickStyle}">${u.username}</h3>
                    <p class="text-[10px] font-bold opacity-30 mt-2 uppercase tracking-widest">Lvl ${u.level || 1}</p>
                    <div class="grid grid-cols-2 gap-3 w-full mt-10">
                        <button data-action="openChat" data-param="${u.uid}" class="p-5 btn-black rounded-3xl font-black uppercase text-[10px]">Чат</button>
                        <button class="p-5 btn-white rounded-3xl font-black uppercase text-[10px]">Донат</button>
                    </div>
                </div>`;
            }

            if(s.chatMode) {
                const msgs = s.messages.filter(m => s.isGroup ? m.to === s.chatMode : ((m.from===s.profile.uid&&m.to===s.chatMode) || (m.from===s.chatMode&&m.to===s.profile.uid) || (m.from==='anon'&&m.to===s.chatMode)));
                return `<div class="flex flex-col h-full px-6 pt-2">
                    <div class="flex justify-between items-center mb-6">
                        <button data-action="openChat" data-param="null" class="text-[10px] font-black uppercase opacity-30">Назад</button>
                        <p class="text-[11px] font-black uppercase tracking-widest text-center">Беседа</p>
                        <button data-action="toggleAnon" class="text-[10px] font-black uppercase ${s.anonMode?'text-green-500':'opacity-30'}">Anon</button>
                    </div>
                    <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 pb-4">${msgs.map(m => `<div class="flex ${m.from === s.profile.uid ? 'justify-end' : 'justify-start'}"><div class="${m.isAnon ? 'msg-anon' : (m.from === s.profile.uid ? 'msg-me' : 'msg-them')} p-4 max-w-[85%] text-xs shadow-sm"><div class="text-[7px] font-black uppercase opacity-40 mb-1">${m.sender}</div><div class="leading-relaxed">${m.text}</div></div></div>`).join('')}</div>
                    <div class="py-4 flex gap-2"><input id="msg-input" class="flex-1 bg-gray-50 dark:bg-zinc-900 p-5 rounded-3xl text-xs outline-none" placeholder="Сообщение..."><button data-action="sendMsg" class="w-14 h-14 btn-black rounded-3xl flex items-center justify-center font-black">↑</button></div>
                </div>`;
            }

            if(s.tab === 'chats') {
                return `<div class="p-6 space-y-3">${s.users.filter(u => u.uid !== s.profile.uid).map(u => `<div data-action="openChat" data-param="${u.uid}" class="p-4 card-flat flex items-center gap-4 cursor-pointer"><div data-action="openProfile" data-param="${u.uid}" class="w-14 h-14 rounded-2xl bg-gray-50 dark:bg-zinc-900 overflow-hidden flex items-center justify-center font-black ${framesMap[u.frame] || ''}">${u.avatar ? `<img src="${u.avatar}" class="w-full h-full object-cover">` : u.username[0].toUpperCase()}</div><div class="flex-1"><h4 class="text-xs font-black uppercase nick-${u.nickStyle}">${u.username}</h4><p class="text-[9px] font-bold opacity-30 uppercase">Lvl ${u.level || 1}</p></div></div>`).join('')}</div>`;
            }

            if(s.tab === 'tasks') {
                const t = s.profile.tasks || {};
                const now = Date.now();
                const dailyWait = now - (t.lastDaily || 0) < 86400000;
                return `<div class="p-6 space-y-4">
                    <div class="task-card flex justify-between items-center ${dailyWait ? 'task-done' : 'bg-black text-white'}" data-action="dailyBonus">
                        <div><h3 class="font-black uppercase text-[11px]">Daily Bonus</h3><p class="text-[8px] opacity-60 mt-1 uppercase">${dailyWait ? 'Wait' : 'Collect'}</p></div>
                        <span class="font-black text-[11px]">50 S</span>
                    </div>
                    <div class="task-card flex justify-between items-center card-flat" data-action="copyRef">
                        <div><h3 class="font-black uppercase text-[11px]">Referrals</h3><p class="text-[8px] opacity-30 mt-1 uppercase">Copy link</p></div>
                        <span class="font-black text-[11px]">50 S</span>
                    </div>
                    <div class="task-card flex justify-between items-center ${t.setAvatar ? 'task-done' : 'card-flat'}">
                        <div><h3 class="font-black uppercase text-[11px]">Profile Pic</h3><p class="text-[8px] opacity-30 mt-1 uppercase">Set avatar</p></div>
                        <span class="font-black text-[11px]">100 S</span>
                    </div>
                    <div class="task-card flex justify-between items-center ${t.findFriends ? 'task-done' : 'card-flat'}">
                        <div><h3 class="font-black uppercase text-[11px]">Socialize</h3><p class="text-[8px] opacity-30 mt-1 uppercase">10 messages</p></div>
                        <span class="font-black text-[11px]">50 S</span>
                    </div>
                    <div class="task-card flex justify-between items-center ${t.firstBuy ? 'task-done' : 'card-flat'}">
                        <div><h3 class="font-black uppercase text-[11px]">First Buy</h3><p class="text-[8px] opacity-30 mt-1 uppercase">Any item</p></div>
                        <span class="font-black text-[11px]">200 S</span>
                    </div>
                </div>`;
            }

            if(s.tab === 'market') {
                const p = s.profile;
                const isPrem = p.premium;
                const colors = ['red', 'orange', 'yellow', 'green', 'cyan', 'blue', 'purple', 'pink'];
                return `<div class="p-6 space-y-8 pb-32">
                    <div class="p-6 card-flat bg-black text-white flex justify-between items-center" data-action="buyItem" data-param="premium" data-param2="700">
                        <div><h3 class="font-black italic uppercase text-sm">Premium</h3><p class="text-[9px] opacity-60 uppercase">20% Discount Everywhere</p></div>
                        <span class="font-black text-xs">700 S</span>
                    </div>
                    
                    <div><p class="text-[9px] font-black uppercase opacity-20 mb-4 tracking-[0.2em]">Neon Nicks (150 S)</p>
                    <div class="grid grid-cols-2 gap-3">
                        ${colors.map(c => `<button class="p-5 card-flat nick-neon-${c} text-[10px] font-black uppercase" data-action="buyItem" data-param="nickStyle" data-param2="150" data-val="neon-${c}">${c}</button>`).join('')}
                        <button class="p-5 card-flat nick-gold text-[10px] font-black uppercase" data-action="buyItem" data-param="nickStyle" data-param2="150" data-val="gold">Gold</button>
                        <button class="p-5 card-flat nick-rainbow text-[10px] font-black uppercase" data-action="buyItem" data-param="nickStyle" data-param2="150" data-val="rainbow">Rainbow</button>
                        <button class="p-5 card-flat nick-fire text-[10px] font-black uppercase" data-action="buyItem" data-param="nickStyle" data-param2="150" data-val="fire">Fire</button>
                    </div></div>

                    <div><p class="text-[9px] font-black uppercase opacity-20 mb-4 tracking-[0.2em]">Neon Frames (250 S)</p>
                    <div class="grid grid-cols-2 gap-3 text-[10px] font-black uppercase">
                        ${colors.map(c => `<button class="p-5 card-flat" data-action="buyItem" data-param="frame" data-param2="250" data-val="neon-${c}">${c}</button>`).join('')}
                        <button class="p-5 card-flat" data-action="buyItem" data-param="frame" data-param2="250" data-val="gold">Gold</button>
                        <button class="p-5 card-flat" data-action="buyItem" data-param="frame" data-param2="250" data-val="blood">Blood</button>
                    </div></div>

                    <div><p class="text-[9px] font-black uppercase opacity-20 mb-4 tracking-[0.2em]">Special Nicks</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button class="p-5 card-flat ${p.level < 5 ? 'opacity-30' : ''}" data-action="buyItem" data-param="nickStyle" data-param2="200" data-val="veteran" data-lvl="5"><span class="nick-veteran text-[9px]">Veteran</span></button>
                        <button class="p-5 card-flat ${p.level < 10 ? 'opacity-30' : ''}" data-action="buyItem" data-param="nickStyle" data-param2="300" data-val="chatty" data-lvl="10"><span class="nick-chatty text-[9px]">Chatty</span></button>
                    </div></div>
                </div>`;
            }

            if(s.tab === 'profile') {
                return `<div class="p-10 flex flex-col items-center">
                    <div data-action="changeAvatar" class="w-32 h-32 rounded-[45px] bg-gray-50 dark:bg-zinc-900 border-4 overflow-hidden flex items-center justify-center text-4xl font-black mb-6 ${framesMap[s.profile.frame] || 'border-transparent'}">
                        ${s.profile.avatar ? `<img src="${s.profile.avatar}" class="w-full h-full object-cover">` : s.profile.username[0].toUpperCase()}
                    </div>
                    <h2 class="text-3xl font-black uppercase nick-${s.profile.nickStyle}">${s.profile.username}</h2>
                    <div class="w-full mt-6">
                        <div class="flex justify-between text-[9px] font-black uppercase opacity-40 mb-2"><span>Level ${s.profile.level || 1}</span><span>${s.profile.xp || 0} / 1000 XP</span></div>
                        <div class="xp-bar"><div class="xp-progress" style="width: ${(s.profile.xp || 0) / 10}%"></div></div>
                    </div>
                    <div class="mt-12 w-full space-y-3">
                        <button data-action="toggleTheme" class="w-full p-5 card-flat font-black uppercase text-[10px] flex justify-between items-center">Theme <i data-lucide="moon" size="14"></i></button>
                        ${s.profile.username === 'hafa168' ? `<button data-action="toggleConsole" data-param="true" class="w-full p-5 card-flat border-green-200 text-green-600 font-black uppercase text-[10px]">OS Console</button>` : ''}
                        <button data-action="logout" class="w-full p-5 border border-red-50 text-red-500 rounded-3xl font-black uppercase text-[10px]">Logout</button>
                    </div>
                </div>`;
            }
        }

        function renderConsole() {
            return `<div class="modal-overlay"><div class="console-box flex flex-col h-[60vh]">
                <div class="flex justify-between mb-4 border-b border-zinc-800 pb-3"><span class="text-[10px] font-bold">Hafland Shell v4.2</span><button data-action="toggleConsole" data-param="false">✕</button></div>
                <div class="flex-1 overflow-y-auto text-[10px] font-mono mb-4">${state.consoleLogs.map(l=>`<div>${l}</div>`).join('')}</div>
                <div class="border-t border-zinc-800 pt-3 flex gap-2">
                    <span class="text-green-500 font-mono">$</span>
                    <input class="bg-transparent outline-none flex-1 text-[10px] font-mono" autofocus onkeypress="if(event.key==='Enter'){ actions.runCommand(this.value); this.value=''}">
                </div>
            </div></div>`;
        }
    </script>
</body>
</html>
