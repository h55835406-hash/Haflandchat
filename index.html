<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hafland Evolution 3.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --border: #eeeeee; --glass: rgba(255, 255, 255, 0.98); }
        .dark { --bg: #000000; --text: #ffffff; --border: #1a1a1a; --glass: rgba(0, 0, 0, 0.98); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; -webkit-tap-highlight-color: transparent; }
        
        .glass-nav { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); z-index: 100; position: fixed; bottom: 0; left: 0; right: 0; height: calc(75px + env(safe-area-inset-bottom)); display: flex; justify-content: space-around; align-items: flex-start; padding-top: 12px; }
        .content-scroll { height: calc(100vh - 150px); overflow-y: auto; padding-bottom: 120px; }
        .content-scroll::-webkit-scrollbar { display: none; }
        
        .msg-me { background: var(--text); color: var(--bg); border-radius: 18px 18px 4px 18px; }
        .msg-them { background: var(--bg); color: var(--text); border-radius: 18px 18px 18px 4px; border: 1px solid var(--border); }
        .msg-anon { background: #000; color: #00ff00; border-radius: 18px; font-family: monospace; border: 1px dashed #333; }
        
        .nick-gold { color: #ffd700; font-weight: 800; text-shadow: 0 0 5px rgba(255,215,0,0.3); }
        .nick-neon { color: #00f2ff; text-shadow: 0 0 8px #00f2ff; font-weight: 800; }
        .nick-rainbow { background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        
        .frame-neon { outline: 3px solid #00f2ff; outline-offset: -2px; }
        .frame-gold { outline: 3px solid #ffd700; outline-offset: -2px; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .console-box { background: #000; color: #0f0; font-family: 'Courier New', monospace; width: 100%; max-width: 450px; border-radius: 24px; padding: 20px; border: 1px solid #333; }
        
        button:active { transform: scale(0.96); opacity: 0.8; }
        input:focus { border-color: #000; }
    </style>
</head>
<body class="light">
    <div id="app" class="h-full flex flex-col relative">
        <div class="h-full flex items-center justify-center">
            <div class="animate-pulse font-black uppercase italic opacity-20 text-4xl">Hafland</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAkgC4melkEcj0pDywonPG3aAeE3vACoF0", 
            authDomain: "hafland-c8dc3.firebaseapp.com", 
            projectId: "hafland-c8dc3", 
            storageBucket: "hafland-c8dc3.firebasestorage.app", 
            messagingSenderId: "163991622474", 
            appId: "1:163991622474:web:06a7357e295c9a98b327b3" 
        };

        const fApp = initializeApp(firebaseConfig);
        const auth = getAuth(fApp);
        const db = getFirestore(fApp);
        const APP_ID = "hafland_v3_stable";

        // State
        window.state = {
            user: null, profile: null, tab: 'chats', subTab: 'users', chatMode: null, isGroup: false,
            viewProfile: null, messages: [], users: [], groups: [],
            anonMode: false, initialized: false, nftMode: false, tempNft: null, 
            showConsole: false, consoleLogs: ['> system.ready']
        };

        // Actions
        const actions = {
            setTab: (t) => { state.tab = t; state.chatMode = null; state.viewProfile = null; render(); },
            setSubTab: (t) => { state.subTab = t; render(); },
            openChat: (id, isGroup = false) => { state.chatMode = id; state.isGroup = isGroup; state.viewProfile = null; render(); },
            openProfile: (uid) => { state.viewProfile = uid; state.chatMode = null; render(); },
            sendMsg: async () => {
                const el = document.getElementById('msg-input');
                const val = el?.value.trim();
                if(!val) return;
                const isAnon = state.anonMode;
                if(isAnon && !state.profile.premium && state.profile.stars < 50) return alert("Нужно 50 S для анонимки");
                
                await addDoc(collection(db, 'artifacts', APP_ID, 'messages'), {
                    from: isAnon ? 'anon' : state.profile.uid,
                    to: state.chatMode,
                    isGroup: state.isGroup,
                    text: val,
                    sender: isAnon ? 'Аноним' : state.profile.username,
                    time: Date.now(),
                    isAnon: isAnon
                });
                if(isAnon && !state.profile.premium) await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), { stars: increment(-50) });
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), { xp: increment(10) });
                el.value = '';
            },
            toggleAnon: () => { state.anonMode = !state.anonMode; render(); },
            toggleConsole: (v) => { state.showConsole = v; render(); },
            handleLogin: async () => {
                const n = document.getElementById('a-nick').value.trim().toLowerCase();
                const p = document.getElementById('a-pass').value.trim();
                if(!n || !p) return;
                const regRef = doc(db, 'artifacts', APP_ID, 'registry', n);
                const regSnap = await getDoc(regRef);
                if(regSnap.exists() && regSnap.data().pass === p) {
                    localStorage.setItem('haf_nick', n); localStorage.setItem('haf_pass', p);
                    initListeners(regSnap.data().uid);
                } else alert("Ошибка входа");
            },
            handleReg: async () => {
                const n = document.getElementById('a-nick').value.trim().toLowerCase();
                const p = document.getElementById('a-pass').value.trim();
                if(!n || !p) return;
                if(n.length < 3) return alert("Ник слишком короткий");
                const regRef = doc(db, 'artifacts', APP_ID, 'registry', n);
                const regSnap = await getDoc(regRef);
                if(regSnap.exists()) return alert("Ник занят");
                
                const uid = auth.currentUser.uid;
                await setDoc(regRef, { uid, pass: p });
                await setDoc(doc(db, 'artifacts', APP_ID, 'users', uid), {
                    uid, username: n, pass: p, stars: 100, tag: 'USER', nfts: [], avatar: null,
                    premium: (n === 'hafa168'), nickStyle: 'normal', level: 1, xp: 0, darkMode: false, frame: 'none'
                });
                localStorage.setItem('haf_nick', n); localStorage.setItem('haf_pass', p);
                initListeners(uid);
            }
        };

        // Event Delegation (Fixes non-working buttons)
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if(!btn) return;
            const action = btn.getAttribute('data-action');
            const param = btn.getAttribute('data-param');
            const param2 = btn.getAttribute('data-param2');
            
            if(action === 'setTab') actions.setTab(param);
            if(action === 'setSubTab') actions.setSubTab(param);
            if(action === 'openChat') actions.openChat(param, param2 === 'true');
            if(action === 'openProfile') actions.openProfile(param);
            if(action === 'sendMsg') actions.sendMsg();
            if(action === 'toggleAnon') actions.toggleAnon();
            if(action === 'toggleConsole') actions.toggleConsole(param === 'true');
            if(action === 'login') actions.handleLogin();
            if(action === 'reg') actions.handleReg();
            if(action === 'logout') { localStorage.clear(); location.reload(); }
            if(action === 'toggleTheme') updateDoc(doc(db,'artifacts',APP_ID,'users',state.profile.uid), {darkMode: !state.profile.darkMode});
            if(action === 'buyStyle') buyItem('nickStyle', param, param2);
            if(action === 'buyFrame') buyItem('frame', 250, param);
        });

        async function buyItem(field, price, val) {
            if(state.profile.stars < price) return alert("Мало S");
            await updateDoc(doc(db, 'artifacts', APP_ID, 'users', state.profile.uid), { stars: increment(-price), [field]: val });
            alert("Готово!");
        }

        // Firebase Auth
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                state.user = u;
                const sn = localStorage.getItem('haf_nick');
                const sp = localStorage.getItem('haf_pass');
                if(sn && sp) {
                    const r = await getDoc(doc(db, 'artifacts', APP_ID, 'registry', sn.toLowerCase()));
                    if(r.exists() && r.data().pass === sp) initListeners(r.data().uid);
                    else renderAuth();
                } else renderAuth();
            } else { await signInAnonymously(auth); }
        });

        function initListeners(uid) {
            onSnapshot(doc(db, 'artifacts', APP_ID, 'users', uid), (s) => {
                if(s.exists()) {
                    state.profile = s.data();
                    document.body.className = state.profile.darkMode ? 'dark' : 'light';
                    state.initialized = true;
                    render();
                }
            });
            onSnapshot(collection(db, 'artifacts', APP_ID, 'users'), (s) => { state.users = s.docs.map(d => d.data()); render(); });
            onSnapshot(collection(db, 'artifacts', APP_ID, 'messages'), (s) => { 
                state.messages = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.time - b.time); 
                render(); 
            });
            onSnapshot(collection(db, 'artifacts', APP_ID, 'groups'), (s) => { state.groups = s.docs.map(d => ({id: d.id, ...d.data()})); render(); });
        }

        function renderAuth() {
            document.getElementById('app').innerHTML = `
                <div class="h-full flex flex-col items-center justify-center p-10 bg-white text-black">
                    <h1 class="text-5xl font-black italic tracking-tighter mb-2">Hafland</h1>
                    <p class="text-[10px] font-bold uppercase opacity-30 mb-12">Evolution 3.7.0</p>
                    <div class="w-full max-w-xs space-y-3">
                        <input id="a-nick" class="w-full p-5 rounded-3xl border border-gray-100 text-center font-bold outline-none uppercase text-xs" placeholder="НИКНЕЙМ">
                        <input id="a-pass" type="password" class="w-full p-5 rounded-3xl border border-gray-100 text-center font-bold outline-none text-xs" placeholder="ПАРОЛЬ">
                        <div class="pt-4 space-y-3">
                            <button data-action="login" class="w-full p-5 border-2 border-black rounded-3xl font-black uppercase text-xs">Войти</button>
                            <button data-action="reg" class="w-full p-5 bg-black text-white rounded-3xl font-black uppercase text-xs">Регистрация</button>
                        </div>
                    </div>
                </div>`;
        }

        function render() {
            if(!state.profile) return;
            const s = state;
            document.getElementById('app').innerHTML = `
                <header class="pt-14 px-8 pb-4 flex justify-between items-end border-b border-gray-50 dark:border-zinc-900 sticky top-0 z-50 bg-inherit">
                    <div>
                        <h2 class="text-2xl font-black italic uppercase tracking-tighter">Hafland</h2>
                        <p class="text-[8px] font-bold opacity-30 uppercase">${s.viewProfile ? 'Profile' : (s.chatMode ? 'Chat' : s.tab)}</p>
                    </div>
                    <div class="flex items-center gap-2">
                         <div class="px-3 py-1 rounded-full border border-gray-100 dark:border-zinc-800 font-black text-[10px]">${s.profile.stars} S</div>
                    </div>
                </header>

                <main class="content-scroll">${renderPage()}</main>

                ${s.showConsole ? renderConsole() : ''}

                <nav class="glass-nav">
                    <button data-action="setTab" data-param="chats" class="flex-1 flex flex-col items-center">
                        <i data-lucide="message-square" class="${s.tab==='chats'?'opacity-100':'opacity-20'}"></i>
                    </button>
                    <button data-action="setTab" data-param="market" class="flex-1 flex flex-col items-center">
                        <i data-lucide="shopping-bag" class="${s.tab==='market'?'opacity-100':'opacity-20'}"></i>
                    </button>
                    <button data-action="setTab" data-param="profile" class="flex-1 flex flex-col items-center">
                        <i data-lucide="user" class="${s.tab==='profile'?'opacity-100':'opacity-20'}"></i>
                    </button>
                </nav>
            `;
            lucide.createIcons();
            const box = document.getElementById('chat-box'); if(box) box.scrollTop = box.scrollHeight;
        }

        function renderPage() {
            const s = state;
            if(s.viewProfile) {
                const u = s.users.find(x => x.uid === s.viewProfile);
                if(!u) return '';
                return `
                    <div class="p-8 flex flex-col items-center">
                        <button data-action="setTab" data-param="chats" class="self-start text-[10px] font-black uppercase mb-8 flex items-center gap-2">
                            <i data-lucide="chevron-left" size="14"></i> Назад
                        </button>
                        <div class="w-28 h-28 rounded-[40px] bg-gray-100 dark:bg-zinc-900 flex items-center justify-center overflow-hidden mb-6 border-4 ${u.frame==='neon'?'frame-neon':(u.frame==='gold'?'frame-gold':'border-transparent')}">
                            ${u.avatar ? `<img src="${u.avatar}" class="w-full h-full object-cover">` : `<span class="text-4xl font-black">${u.username[0].toUpperCase()}</span>`}
                        </div>
                        <h3 class="text-3xl font-black uppercase nick-${u.nickStyle}">${u.username}</h3>
                        <p class="text-[9px] font-bold opacity-30 mt-1 uppercase tracking-widest">${u.tag || 'User'}</p>
                        
                        <div class="grid grid-cols-2 gap-3 w-full mt-10">
                            <button data-action="openChat" data-param="${u.uid}" class="p-4 bg-black text-white rounded-2xl font-black uppercase text-[10px]">Личное сообщение</button>
                            <button class="p-4 border border-black rounded-2xl font-black uppercase text-[10px] opacity-20">Передать S</button>
                        </div>

                        <div class="w-full mt-12">
                            <h4 class="text-[10px] font-black uppercase mb-4 opacity-20">Коллекция NFT</h4>
                            <div class="grid grid-cols-3 gap-2">
                                ${(u.nfts || []).length ? u.nfts.map(n => `<div class="aspect-square rounded-xl bg-gray-50 dark:bg-zinc-900 border overflow-hidden"><img src="${n.img}" class="w-full h-full object-cover"></div>`).join('') : '<div class="col-span-3 py-10 border-2 border-dashed rounded-3xl opacity-10 text-center text-xs font-bold">ПУСТО</div>'}
                            </div>
                        </div>
                    </div>`;
            }

            if(s.chatMode) {
                const msgs = s.messages.filter(m => s.isGroup ? m.to === s.chatMode : ((m.from===s.profile.uid&&m.to===s.chatMode) || (m.from===s.chatMode&&m.to===s.profile.uid) || (m.from==='anon'&&m.to===s.chatMode)));
                const chatWith = s.isGroup ? s.groups.find(g => g.id === s.chatMode)?.name : s.users.find(u => u.uid === s.chatMode)?.username;
                
                return `
                    <div class="flex flex-col h-full px-6 pt-2">
                        <div class="flex justify-between items-center mb-6">
                            <button data-action="openChat" data-param="null" class="text-[10px] font-black uppercase opacity-20">Закрыть</button>
                            <div class="text-center">
                                <p class="text-[11px] font-black uppercase tracking-tighter">${chatWith || 'Чат'}</p>
                                <p class="text-[7px] font-bold opacity-20 uppercase">End-to-End Encryption</p>
                            </div>
                            <button data-action="toggleAnon" class="text-[10px] font-black uppercase ${s.anonMode?'text-green-500':'opacity-20'}">Anon</button>
                        </div>
                        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 pb-4">
                            ${msgs.map(m => `
                                <div class="flex ${m.from === s.profile.uid ? 'justify-end' : 'justify-start'}">
                                    <div class="${m.isAnon ? 'msg-anon' : (m.from === s.profile.uid ? 'msg-me' : 'msg-them')} p-4 max-w-[80%] text-xs shadow-sm">
                                        <div class="text-[8px] font-black uppercase opacity-40 mb-1 flex justify-between gap-4">
                                            <span>${m.sender}</span>
                                            <span>${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                        </div>
                                        <div class="leading-relaxed">${m.text}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="py-4 flex gap-2">
                            <input id="msg-input" class="flex-1 bg-gray-50 dark:bg-zinc-900 border-none p-5 rounded-3xl text-xs outline-none focus:ring-1 ring-black" placeholder="Пиши здесь..." onkeypress="if(event.key==='Enter') document.querySelector('[data-action=sendMsg]').click()">
                            <button data-action="sendMsg" class="w-14 h-14 bg-black text-white rounded-3xl flex items-center justify-center font-black">↑</button>
                        </div>
                    </div>`;
            }

            if(s.tab === 'chats') {
                return `
                    <div class="p-6">
                        <div class="flex gap-2 mb-6">
                            <button data-action="setSubTab" data-param="users" class="flex-1 p-4 rounded-2xl font-black uppercase text-[10px] ${s.subTab==='users'?'bg-black text-white':'bg-gray-50 dark:bg-zinc-900 opacity-40'}">Люди</button>
                            <button data-action="setSubTab" data-param="groups" class="flex-1 p-4 rounded-2xl font-black uppercase text-[10px] ${s.subTab==='groups'?'bg-black text-white':'bg-gray-50 dark:bg-zinc-900 opacity-40'}">Группы</button>
                        </div>
                        
                        <div class="space-y-3">
                            ${s.subTab === 'users' ? s.users.filter(u => u.uid !== s.profile.uid).map(u => `
                                <div class="p-4 border rounded-3xl flex items-center gap-4 bg-white dark:bg-zinc-950">
                                    <div data-action="openProfile" data-param="${u.uid}" class="w-12 h-12 rounded-2xl bg-gray-100 dark:bg-zinc-900 overflow-hidden flex items-center justify-center font-black ${u.frame==='neon'?'frame-neon':(u.frame==='gold'?'frame-gold':'')}">
                                        ${u.avatar ? `<img src="${u.avatar}" class="w-full h-full object-cover">` : u.username[0].toUpperCase()}
                                    </div>
                                    <div class="flex-1" data-action="openChat" data-param="${u.uid}">
                                        <h4 class="text-xs font-black uppercase nick-${u.nickStyle}">${u.username}</h4>
                                        <p class="text-[8px] font-bold opacity-20 uppercase">${u.customStatus || 'В сети'}</p>
                                    </div>
                                    <button data-action="openChat" data-param="${u.uid}" class="w-10 h-10 flex items-center justify-center opacity-20">
                                        <i data-lucide="send" size="18"></i>
                                    </button>
                                </div>
                            `).join('') : s.groups.map(g => `
                                <div data-action="openChat" data-param="${g.id}" data-param2="true" class="p-6 border rounded-3xl flex justify-between items-center">
                                    <span class="font-black uppercase text-xs italic"># ${g.name}</span>
                                    <i data-lucide="chevron-right" size="14" class="opacity-20"></i>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }

            if(s.tab === 'market') {
                return `
                    <div class="p-6 space-y-8">
                        <div>
                            <h4 class="text-[10px] font-black uppercase mb-4 opacity-20">Никнейм (150 S)</h4>
                            <div class="grid grid-cols-2 gap-2">
                                <button data-action="buyStyle" data-param="150" data-param2="gold" class="p-4 border rounded-2xl text-[10px] nick-gold uppercase">Gold Style</button>
                                <button data-action="buyStyle" data-param="150" data-param2="neon" class="p-4 border rounded-2xl text-[10px] nick-neon uppercase">Neon Style</button>
                                <button data-action="buyStyle" data-param="150" data-param2="rainbow" class="p-4 border rounded-2xl text-[10px] nick-rainbow uppercase">Rainbow</button>
                                <button data-action="buyStyle" data-param="150" data-param2="red" class="p-4 border rounded-2xl text-[10px] text-red-500 font-bold uppercase">Red Basic</button>
                            </div>
                        </div>
                        <div>
                            <h4 class="text-[10px] font-black uppercase mb-4 opacity-20">Рамки профиля (250 S)</h4>
                            <div class="grid grid-cols-2 gap-2">
                                <button data-action="buyFrame" data-param="gold" class="p-4 border-4 border-[#ffd700] rounded-2xl text-[10px] font-black uppercase">Gold Frame</button>
                                <button data-action="buyFrame" data-param="neon" class="p-4 border-4 border-[#00f2ff] rounded-2xl text-[10px] font-black uppercase">Neon Frame</button>
                            </div>
                        </div>
                        <button class="w-full p-6 bg-black text-white rounded-3xl font-black uppercase text-xs italic tracking-tighter opacity-20">Создать NFT (Soon)</button>
                    </div>`;
            }

            if(s.tab === 'profile') {
                return `
                    <div class="p-10 flex flex-col items-center">
                        <div class="w-32 h-32 rounded-[45px] bg-gray-50 dark:bg-zinc-900 border-4 overflow-hidden flex items-center justify-center text-4xl font-black mb-6 ${s.profile.frame==='neon'?'frame-neon':(s.profile.frame==='gold'?'frame-gold':'border-transparent')}">
                            ${s.profile.avatar ? `<img src="${s.profile.avatar}" class="w-full h-full object-cover">` : s.profile.username[0].toUpperCase()}
                        </div>
                        <h2 class="text-3xl font-black uppercase nick-${s.profile.nickStyle}">${s.profile.username}</h2>
                        
                        <div class="mt-10 w-full space-y-3">
                            <button data-action="toggleTheme" class="w-full p-5 border rounded-3xl font-black uppercase text-[10px] flex justify-between items-center">
                                Сменить тему <span><i data-lucide="sun" size="14"></i></span>
                            </button>
                            ${s.profile.username === 'hafa168' ? `<button data-action="toggleConsole" data-param="true" class="w-full p-5 border border-green-500/30 text-green-500 rounded-3xl font-black uppercase text-[10px]">Developer Console</button>` : ''}
                            <button data-action="logout" class="w-full p-5 border border-red-100 text-red-500 rounded-3xl font-black uppercase text-[10px]">Выйти из аккаунта</button>
                        </div>
                        
                        <div class="w-full mt-10 p-6 bg-gray-50 dark:bg-zinc-900 rounded-[32px]">
                            <p class="text-[9px] font-black uppercase opacity-30 mb-2">Статистика</p>
                            <div class="flex justify-between font-black text-xs uppercase">
                                <span>Уровень ${s.profile.level || 1}</span>
                                <span class="opacity-30">${s.profile.xp || 0} XP</span>
                            </div>
                            <div class="w-full h-1 bg-gray-200 dark:bg-zinc-800 mt-3 rounded-full overflow-hidden">
                                <div class="h-full bg-black dark:bg-white" style="width: ${(s.profile.xp % 100)}%"></div>
                            </div>
                        </div>
                    </div>`;
            }
        }

        function renderConsole() {
            return `
                <div class="modal-overlay">
                    <div class="console-box flex flex-col h-[65vh]">
                        <div class="flex justify-between items-center mb-4 border-b border-zinc-800 pb-3">
                            <span class="text-[10px] font-bold uppercase opacity-50 italic">Hafland OS Shell</span>
                            <button data-action="toggleConsole" data-param="false" class="text-white text-xl">✕</button>
                        </div>
                        <div class="flex-1 overflow-y-auto text-[10px] space-y-1 opacity-80">
                            ${state.consoleLogs.map(l=>`<div>${l}</div>`).join('')}
                        </div>
                        <div class="mt-4 border-t border-zinc-800 pt-3 flex gap-2">
                            <span class="text-green-500 font-bold">$</span>
                            <input class="bg-transparent outline-none flex-1 text-[10px]" placeholder="type command..." onkeypress="if(event.key==='Enter'){ state.consoleLogs.push('> '+this.value); render(); this.value=''}">
                        </div>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
